name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on semantic version tags like v2.0.0

permissions:
  contents: write # Allows GitHub Actions to create releases and upload assets

jobs:
  build-and-release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, arm] # Builds for x86_64, 64-bit ARM, and 32-bit ARM

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true # Caches dependencies within the runner context

      - name: Compile Static Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # Forces static compilation (no glibc reliance, fully Alpine/musl compatible)
        run: |
          # Compiles a stripped, minimal statically-linked binary
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -a \
            -o stremio-ai-search \
            cmd/addon/main.go

      - name: Package Release Asset
        run: |
          # Bundles static binary and web asset folder into a tarball
          tar -czvf "stremio-ai-search-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" stremio-ai-search web/

      - name: Upload Binaries to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            stremio-ai-search-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
