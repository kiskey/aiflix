name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on semantic version tags like v2.0.0

permissions:
  contents: write # Allows GitHub Actions to create releases and upload assets

jobs:
  build-and-release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, arm] # Builds for x86_64, 64-bit ARM, and 32-bit ARM

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true # Caches dependencies within the runner context

      - name: Auto-Detect and Compile Static Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # Forces static compilation (fully Alpine/musl compatible)
        run: |
          # 1. Dynamically locate the directory containing go.mod
          if [ -f "go.mod" ]; then
            WORKDIR="."
          elif [ -f "aiflix-main/go.mod" ]; then
            WORKDIR="aiflix-main"
          else
            # Fallback search for any nested Go modules
            GOMOD_PATH=$(find . -name "go.mod" -print -quit)
            if [ -n "$GOMOD_PATH" ]; then
              WORKDIR=$(dirname "$GOMOD_PATH")
            else
              echo "Error: go.mod not found in repository!"
              exit 1
            fi
          fi
          echo "Targeting Go module directory: $WORKDIR"

          # 2. Enter workspace directory
          cd "$WORKDIR"

          # 3. Build static production binary with on-the-fly module loading (-mod=mod)
          go build \
            -mod=mod \
            -trimpath \
            -ldflags="-s -w" \
            -a \
            -o stremio-ai-search \
            cmd/addon/main.go

          # 4. Compress the binary and adjacent static web folder directly into the repository root workspace
          tar -czvf "$GITHUB_WORKSPACE/stremio-ai-search-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" stremio-ai-search web/

      - name: Upload Binaries to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Automatically finds tarballs pushed to the repository root workspace
          files: |
            stremio-ai-search-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
